<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
        CSS.supports('top: constant(a)'))
      document.write(
        '<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
        (coverSupport ? ', viewport-fit=cover' : '') + '" />')

    <title>糖果学英语</title>
    <!-- PWA Support -->
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <meta name="theme-color" content="#667eea" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="糖果英语" />
    <link rel="apple-touch-icon" href="/static/pwa-icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/static/pwa-icons/icon-512.png" />
    <!-- Prevent text selection and callout on iOS for kid-friendly experience -->
    <meta name="format-detection" content="telephone=no" />
    <!--preload-links-->
    <!--app-context-->
  </head>
  <body>
    <div id="app"><!--app-html--></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function(err) {
            console.log('SW registration failed: ', err);
          });
        });
      }
    </script>
